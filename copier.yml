_min_copier_version: "9.4.0"
_subdirectory: template
_templates_suffix: .jinja
_answers_file: .copier-answers.yml
_message_after_copy: |
  项目 {{ project_name }} 已生成。

  下一步：
    cd {{ _copier_conf.dst_path }}
    cp .env.example .env
    uv sync
    uv run pytest

project_name:
  type: str
  help: 项目显示名称
  default: FastAPI Service

project_slug:
  type: str
  help: 项目目录和 Python 分发包名称（小写字母、数字和连字符）
  default: "{{ project_name | lower | replace(' ', '-') | replace('_', '-') }}"
  validator: >-
    {% if not (project_slug | regex_search('^[a-z][a-z0-9-]*$')) %}
    project_slug 必须以小写字母开头，且只能包含小写字母、数字和连字符
    {% endif %}

package_name:
  type: str
  help: Python 导入包名称（小写字母、数字和下划线）
  default: app
  validator: >-
    {% if not (package_name | regex_search('^[a-z][a-z0-9_]*$')) %}
    package_name 必须以小写字母开头，且只能包含小写字母、数字和下划线
    {% endif %}

project_description:
  type: str
  help: 项目简介
  default: A FastAPI backend service

author_name:
  type: str
  help: 作者或团队名称
  default: Your Team

python_version:
  type: str
  help: Python 版本
  choices:
    - "3.13"
    - "3.12"
  default: "3.13"

timezone:
  type: str
  help: 默认时区
  default: Asia/Shanghai

server_port:
  type: int
  help: 服务监听端口
  default: 8000
